name: 🧪 Test

on:
  push:
    paths:
      - 'apps/**'
      - 'packages/**'
      - '.github/workflows/test.yml'
  workflow_dispatch:

permissions:
  contents: read

defaults:
  run:
    shell: bash

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: 🧪 Run Tests (Turborepo)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: 📥 リポジトリをチェックアウト
        uses: actions/checkout@v4
        with:
          fetch-depth: 2  # Turborepoの差分検出のため

      - name: 🔍 api-server変更をチェック
        id: changes
        uses: dorny/paths-filter@v4
        with:
          filters: |
            api-server:
              - 'apps/api-server/**'
              - 'packages/shared-types/**'

      - name: 🐳 Docker Compose起動（api-server変更時のみ）
        if: steps.changes.outputs.api-server == 'true'
        working-directory: apps/api-server
        run: |
          echo "🐳 Starting Docker Compose for api-server tests..."
          docker compose up -d mongo
          echo "⏳ Waiting for services to be ready..."
          sleep 5
          docker compose ps

      - name: 📦 pnpmをセットアップ
        uses: pnpm/action-setup@v4

      - name: 🟢 Node.jsのセットアップ
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: 📦 依存関係をインストール
        run: pnpm install --frozen-lockfile

      - name: 🧪 テストを実行（Turborepoが差分検出）
        run: |
          echo "🧪 Running tests (Turborepo will detect changed packages)..."
          pnpm test || echo "⚠️ Some tests may not be configured yet"

      - name: 🧹 Docker Composeクリーンアップ
        if: always() && steps.changes.outputs.api-server == 'true'
        working-directory: apps/api-server
        run: |
          echo "🧹 Cleaning up Docker Compose..."
          docker compose down --volumes --remove-orphans || true

