name: 🧹 CDK Lint
on:
  pull_request:
    paths:
      - 'infrastructure/cdk/**'
      - '.github/workflows/cdk-lint.yml'
  workflow_dispatch:
permissions:
  contents: read
defaults:
  run:
    shell: bash
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: 🧹 CDK Lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: 📥 リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: 📦 pnpmをセットアップ
        uses: pnpm/action-setup@v5

      - name: 🟢 Node.jsのセットアップ
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      
      - name: 📦 依存関係をインストール
        run: pnpm install --frozen-lockfile

      - name: 🧹 ESLintを実行
        working-directory: infrastructure/cdk
        run: pnpm lint

      - name: 🔍 TypeScript型チェック
        working-directory: infrastructure/cdk
        run: pnpm build        
        
        
